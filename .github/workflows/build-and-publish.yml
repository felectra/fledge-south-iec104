# Назва автоматизованого процесу
name: Build and Publish .deb Package

on:
  push:
    branches:
      # Для тестування використовуйте свою гілку
      - feature/setup-ci-cd

jobs:
  build:
    # Використовуємо останню LTS версію Ubuntu для актуальності
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write

    steps:
    # --- ФАЗА 1: ПІДГОТОВКА СЕРЕДОВИЩА ---
    - name: Checkout Plugin Source Code
      uses: actions/checkout@v4
      with:
        # Явно вказуємо, який репозиторій клонувати
        repository: felectra/fledge-south-iec104
        # Клонуємо в окрему, тимчасову директорію
        path: fledge-south-iec104-source

    - name: Install All Build Dependencies
      run: |
        sudo apt-get update
        # Встановлюємо вичерпний список залежностей, виявлених під час попередніх запусків
        sudo apt-get install -y git build-essential cmake libssl-dev libboost-all-dev python3-dev python3-pip uuid-dev libcurl4-openssl-dev sqlite3 python3-numpy
        # Backup: pip install якщо системний пакет недостатній
        sudo pip3 install --break-system-packages numpy>=1.26.0 || echo "Using system numpy package"
        # Створюємо символічне посилання для sqlite3, оскільки Fledge шукає його в нестандартному місці
        sudo ln -s /usr/bin/sqlite3 /usr/local/bin/sqlite3

    - name: Build and Install lib60870 (Critical for IEC104)
      run: |
        # Завантажуємо та збираємо lib60870 - критична залежність для IEC104 плагіна
        cd /tmp
        wget https://github.com/mz-automation/lib60870/archive/refs/tags/v2.3.3.tar.gz
        tar -xf v2.3.3.tar.gz
        cd lib60870-2.3.3/lib60870-C
        
        # Встановлюємо mbedtls dependency
        cd dependencies
        wget https://github.com/ARMmbed/mbedtls/archive/refs/tags/v2.28.9.tar.gz
        tar xf v2.28.9.tar.gz
        mv mbedtls-2.28.9 mbedtls-2.28
        cd ..
        
        # Збираємо lib60870
        mkdir build && cd build
        cmake -DBUILD_TESTS=NO -DBUILD_EXAMPLES=NO ..
        make -j$(nproc)
        sudo make install
        sudo ldconfig

    # --- ФАЗА 2: ІНТЕГРАЦІЯ КОМПОНЕНТІВ ---
    - name: Clone Fledge Source Code (Stable Version)
      run: |
        # Клонуємо стабільну, зафіксовану версію Fledge для передбачуваності збірки
        git clone --branch v3.1.0 --depth 1 https://github.com/fledge-iot/fledge.git

    - name: Integrate Plugin into Fledge Source
      run: |
        # Гарантуємо, що директорія для плагінів існує
        mkdir -p fledge/plugins/south/
        
        # КРИТИЧНО: Виключити зайві директорії перед переміщенням
        echo "=== CLEANING PLUGIN SOURCE ==="
        rm -rf fledge-south-iec104-source/.bmad-core
        rm -rf fledge-south-iec104-source/.claude  
        rm -rf fledge-south-iec104-source/.gemini
        rm -rf fledge-south-iec104-source/.git
        
        # Переміщуємо вихідний код плагіна всередину структури Fledge
        mv fledge-south-iec104-source fledge/plugins/south/fledge-south-iec104
        
        # ДІАГНОСТИКА: Перевіряємо очищену структуру плагіна
        echo "=== CLEANED PLUGIN STRUCTURE ==="
        ls -la fledge/plugins/south/fledge-south-iec104/
        
        # Перевіряємо існуючий south CMakeLists.txt
        echo "=== SOUTH PLUGINS STRUCTURE ==="
        ls -la fledge/plugins/south/ || echo "South directory missing"
        
        # Створюємо CMakeLists.txt якщо не існує
        if [ ! -f "fledge/plugins/south/CMakeLists.txt" ]; then
          echo "Creating south plugins CMakeLists.txt"
          echo "cmake_minimum_required(VERSION 2.8)" > fledge/plugins/south/CMakeLists.txt
          echo "" >> fledge/plugins/south/CMakeLists.txt
          echo "# South plugins" >> fledge/plugins/south/CMakeLists.txt
          echo "add_subdirectory(fledge-south-iec104)" >> fledge/plugins/south/CMakeLists.txt
        else
          echo "=== EXISTING SOUTH CMAKELISTS ==="
          cat fledge/plugins/south/CMakeLists.txt
          # Додаємо наш плагін
          echo 'add_subdirectory(fledge-south-iec104)' >> fledge/plugins/south/CMakeLists.txt
        fi
        
        echo "=== FINAL SOUTH CMAKELISTS ==="
        cat fledge/plugins/south/CMakeLists.txt

    # --- ФАЗА 3: УНІФІКОВАНА ЗБІРКА ТА ПАКУВАННЯ ---
    - name: Prepare Build Directory
      run: mkdir -p fledge/cmake_build

    - name: Configure, Build, and Create Packages
      # Виконуємо всі команди збірки з однієї робочої директорії для надійності
      working-directory: ./fledge/cmake_build
      run: |
        # КРИТИЧНЕ ВИПРАВЛЕННЯ: Використовуємо FLEDGE_SRC для правильних шляхів
        echo "=== CMAKE CONFIGURATION DEBUG ==="
        cmake .. -DFLEDGE_SRC=$(pwd)/.. -DCMAKE_BUILD_TYPE=Release
        
        # ДІАГНОСТИКА: Перевіряємо CMake output для нашого плагіна
        echo "=== BUILD TARGETS DEBUG ==="
        make help | grep -i iec104 || echo "No iec104 targets found"
        
        # Збираємо все разом з parallel compilation
        echo "=== BUILDING PROJECT ==="
        make -j$(nproc)
        
        # FORCED BUILD: Спробуємо збудувати плагін явно
        echo "=== FORCING PLUGIN BUILD ==="
        make iec104 || echo "iec104 target not found, trying alternatives..."
        
        # ДІАГНОСТИКА: Шукаємо всі .so файли після збірки  
        echo "=== SEARCHING FOR BUILT LIBRARIES ==="
        find . -name "*.so" -type f -ls
        
        # ДІАГНОСТИКА: Перевіряємо plugins/south після збірки
        echo "=== CHECKING PLUGIN BUILD DIRECTORY ==="
        ls -la ../plugins/south/fledge-south-iec104/ || echo "Plugin directory missing"
        find ../plugins/south/fledge-south-iec104/ -name "*.so" -type f || echo "No .so in plugin dir"
        
        # ARCHITECTURE DECISION: Skip CPack, create manual .deb package
        echo "=== Creating Manual DEB Package (Architectural Solution) ==="
        
        # Find the built plugin library - розширений пошук
        echo "=== SEARCHING FOR PLUGIN LIBRARY ==="
        PLUGIN_LIB=$(find . -name "libiec104.so" -type f | head -n 1)
        
        if [ -z "$PLUGIN_LIB" ]; then
          echo "::warning:: libiec104.so not found, searching for alternatives..."
          # Шукаємо різні можливі назви
          PLUGIN_LIB=$(find . -name "*iec104*.so" -type f | head -n 1)
          
          if [ -z "$PLUGIN_LIB" ]; then
            echo "::warning:: No iec104 library found, searching in plugin directory..."
            PLUGIN_LIB=$(find ../plugins/south/fledge-south-iec104 -name "*.so" -type f | head -n 1)
            
            if [ -z "$PLUGIN_LIB" ]; then
              echo "::error:: No plugin library found anywhere!"
              echo "=== ALL .so FILES IN BUILD TREE ==="
              find . -name "*.so" -type f -ls
              echo "=== PLUGIN DIRECTORY CONTENTS ==="
              ls -la ../plugins/south/fledge-south-iec104/ || echo "Plugin directory missing"
              exit 1
            fi
          fi
        fi
        
        echo "Found plugin library at: $PLUGIN_LIB"
        
        # Create proper .deb package structure
        mkdir -p deb-package/usr/local/fledge/plugins/south/fledge-south-iec104
        cp "$PLUGIN_LIB" deb-package/usr/local/fledge/plugins/south/fledge-south-iec104/
        
        # Create DEBIAN control file with proper metadata
        mkdir -p deb-package/DEBIAN
        VERSION="1.0.0-$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
        
        # Write control file directly
        echo "Package: fledge-south-iec104" > deb-package/DEBIAN/control
        echo "Version: ${VERSION}" >> deb-package/DEBIAN/control
        echo "Section: base" >> deb-package/DEBIAN/control
        echo "Priority: optional" >> deb-package/DEBIAN/control
        echo "Architecture: amd64" >> deb-package/DEBIAN/control
        echo "Depends: libssl3, libc6" >> deb-package/DEBIAN/control
        echo "Maintainer: FledgePower Team <noreply@fledgepower.com>" >> deb-package/DEBIAN/control
        echo "Description: Fledge South IEC 60870-5-104 Plugin" >> deb-package/DEBIAN/control
        echo " This plugin provides IEC 60870-5-104 protocol support for Fledge." >> deb-package/DEBIAN/control
        echo " It allows Fledge to collect data from IEC 104 devices and systems." >> deb-package/DEBIAN/control
        
        # Build the .deb package
        cd deb-package
        dpkg-deb --build . ../fledge-south-iec104_${VERSION}_amd64.deb
        cd ..
        
        echo "✅ Manual .deb package created successfully!"
        ls -la *.deb

    # --- ФАЗА 4: ПОШУК ТА ПУБЛІКАЦІЯ АРТЕФАКТУ ---
    - name: Find and Prepare Package for Publish
      run: |
        echo "=== DEBUGGING: Directory structure ==="
        find ./fledge/cmake_build -type f -name "*.deb" -ls
        
        # Шукаємо .deb пакет саме нашого плагіна в директорії збірки
        DEB_FILE=$(find ./fledge/cmake_build -name "*iec104*.deb" | head -n 1)
        
        # Надійна перевірка, що файл знайдено
        if [ -z "$DEB_FILE" ]; then
          echo "::error:: .deb file for IEC104 plugin was not found!"
          echo "=== DEBUGGING: All .deb packages found ==="
          find ./fledge/cmake_build -name "*.deb" -exec ls -la {} \;
          echo "=== DEBUGGING: cmake_build contents ==="
          ls -la ./fledge/cmake_build/
          exit 1
        fi
        
        echo "✅ Package created successfully at $DEB_FILE"
        
        # Створюємо директорію для артефакту та копіюємо пакет
        mkdir -p artifacts/
        cp "$DEB_FILE" artifacts/
        
        # Показуємо інформацію про пакет
        ls -la artifacts/
        dpkg -I artifacts/*.deb
        
        echo "PACKAGE_NAME=$(basename $DEB_FILE)" >> $GITHUB_ENV

    - name: Upload Build Artifact to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: fledge-south-iec104-deb
        path: artifacts/
        retention-days: 30

