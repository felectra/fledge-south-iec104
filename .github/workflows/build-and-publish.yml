# Назва автоматизованого процесу
name: Build and Publish .deb Package

on:
  push:
    branches:
      # Для тестування використовуйте свою гілку
      - feature/setup-ci-cd

jobs:
  build:
    # Використовуємо останню LTS версію Ubuntu для актуальності
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write

    steps:
    # --- ФАЗА 1: ПІДГОТОВКА СЕРЕДОВИЩА ---
    - name: Checkout Plugin Source Code
      uses: actions/checkout@v4
      with:
        # Явно вказуємо, який репозиторій клонувати
        repository: felectra/fledge-south-iec104
        # Клонуємо в окрему, тимчасову директорію
        path: fledge-south-iec104-source

    - name: Install All Build Dependencies
      run: |
        sudo apt-get update
        # Встановлюємо вичерпний список залежностей, виявлених під час попередніх запусків
        sudo apt-get install -y git build-essential cmake libssl-dev libboost-all-dev python3-dev python3-pip uuid-dev libcurl4-openssl-dev sqlite3 python3-numpy
        # Backup: pip install якщо системний пакет недостатній
        sudo pip3 install --break-system-packages numpy>=1.26.0 || echo "Using system numpy package"
        # Створюємо символічне посилання для sqlite3, оскільки Fledge шукає його в нестандартному місці
        sudo ln -s /usr/bin/sqlite3 /usr/local/bin/sqlite3

    - name: Build and Install lib60870 (Critical for IEC104)
      run: |
        # Завантажуємо та збираємо lib60870 - критична залежність для IEC104 плагіна
        cd /tmp
        wget https://github.com/mz-automation/lib60870/archive/refs/tags/v2.3.3.tar.gz
        tar -xf v2.3.3.tar.gz
        cd lib60870-2.3.3/lib60870-C
        
        # Встановлюємо mbedtls dependency
        cd dependencies
        wget https://github.com/ARMmbed/mbedtls/archive/refs/tags/v2.28.9.tar.gz
        tar xf v2.28.9.tar.gz
        mv mbedtls-2.28.9 mbedtls-2.28
        cd ..
        
        # Збираємо lib60870
        mkdir build && cd build
        cmake -DBUILD_TESTS=NO -DBUILD_EXAMPLES=NO ..
        make -j$(nproc)
        sudo make install
        sudo ldconfig

    # --- ФАЗА 2: ІНТЕГРАЦІЯ КОМПОНЕНТІВ ---
    - name: Clone Fledge Source Code (Stable Version)
      run: |
        # Клонуємо стабільну, зафіксовану версію Fledge для передбачуваності збірки
        git clone --branch v3.1.0 --depth 1 https://github.com/fledge-iot/fledge.git

    - name: Build and Install Fledge (for plugin headers/libs)
      working-directory: ./fledge
      run: |
        # АРХІТЕКТУРНЕ РІШЕННЯ: Спочатку збудувати Fledge для headers/libs
        echo "=== BUILDING FLEDGE FOR PLUGIN DEPENDENCIES ==="
        mkdir cmake_build && cd cmake_build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)
        
        # Встановити Fledge headers та libraries для plugin build
        sudo make install
        
        # Перевірити встановлення
        echo "=== FLEDGE INSTALLATION VERIFICATION ==="
        echo "Checking /usr/local/fledge/:"
        ls -la /usr/local/fledge/ || echo "Fledge directory not found"
        echo "Checking /usr/local/include/fledge/:"
        ls -la /usr/local/include/fledge/ || echo "Headers not in /usr/local/include/fledge"
        echo "Checking /usr/include/fledge/:"
        ls -la /usr/include/fledge/ || echo "Headers not in /usr/include/fledge"
        echo "Searching for plugin_api.h:"
        find /usr -name "plugin_api.h" 2>/dev/null || echo "plugin_api.h not found anywhere"

    # --- ФАЗА 3: STANDALONE PLUGIN BUILD ---
    - name: Prepare Plugin for Standalone Build
      run: |
        # КРИТИЧНО: Виключити зайві директорії перед збіркою
        echo "=== CLEANING PLUGIN SOURCE ==="
        rm -rf fledge-south-iec104-source/.bmad-core
        rm -rf fledge-south-iec104-source/.claude  
        rm -rf fledge-south-iec104-source/.gemini
        rm -rf fledge-south-iec104-source/.git
        
        echo "=== CLEANED PLUGIN STRUCTURE ==="
        ls -la fledge-south-iec104-source/

    - name: Build Plugin (Standalone)
      working-directory: ./fledge-south-iec104-source
      run: |
        # АРХІТЕКТУРНЕ РІШЕННЯ: Standalone plugin build як у документації
        echo "=== BUILDING IEC104 PLUGIN STANDALONE ==="
        
        # ДІАГНОСТИКА: Перевіряємо структуру Fledge installation
        echo "=== FLEDGE INSTALLATION STRUCTURE DEBUG ==="
        find /usr/local/fledge -type f -name "*.h" | head -10 || echo "Headers not in /usr/local/fledge"
        find /usr/include/fledge -type f -name "*.h" | head -10 || echo "Headers not in /usr/include/fledge"
        find /usr/local/include/fledge -type f -name "*.h" | head -10 || echo "Headers not in /usr/local/include/fledge"
        
        # КРИТИЧНО: Використовуємо правильні CMAKE змінні замість env vars
        echo "=== CMAKE CONFIGURATION WITH EXPLICIT PATHS ==="
        mkdir -p build && cd build
        
        # Спробуємо різні стратегії конфігурації
        if [ -d "/usr/local/include/fledge" ]; then
          echo "Using /usr/local/include/fledge for headers"
          cmake -DCMAKE_BUILD_TYPE=Release -DFLEDGE_INCLUDE=/usr/local/include/fledge -DFLEDGE_LIB=/usr/local/fledge/lib -DFLEDGE_INSTALL=/usr/local/fledge ..
        elif [ -d "/usr/include/fledge" ]; then
          echo "Using /usr/include/fledge for headers"
          cmake -DCMAKE_BUILD_TYPE=Release -DFLEDGE_INCLUDE=/usr/include/fledge -DFLEDGE_LIB=/usr/lib/fledge -DFLEDGE_INSTALL=/usr/local/fledge ..
        else
          echo "Using FLEDGE_SRC approach with source tree"
          cmake -DCMAKE_BUILD_TYPE=Release -DFLEDGE_SRC=../../fledge -DFLEDGE_INSTALL=/usr/local/fledge ..
        fi
        
        # Збудувати плагін
        echo "=== BUILDING PLUGIN ==="
        make -j$(nproc)
        
        # Встановити плагін
        echo "=== INSTALLING PLUGIN ==="
        sudo make install
        
        # Верифікувати збірку
        echo "=== PLUGIN BUILD VERIFICATION ==="
        find . -name "*.so" -type f -ls
    # --- ФАЗА 4: .DEB PACKAGE СТВОРЕННЯ ---
    - name: Create .deb Package
      working-directory: ./fledge-south-iec104-source/build
      run: |
        # ARCHITECTURE DECISION: Create .deb from standalone build
        echo "=== Creating Manual DEB Package (Standalone Build) ==="
        
        # Find the built plugin library
        echo "=== SEARCHING FOR PLUGIN LIBRARY ==="
        PLUGIN_LIB=$(find . -name "libiec104.so" -type f | head -n 1)
        
        if [ -z "$PLUGIN_LIB" ]; then
          echo "::error:: libiec104.so not found after standalone build!"
          echo "=== ALL .so FILES IN BUILD TREE ==="
          find . -name "*.so" -type f -ls
          exit 1
        fi
        
        echo "✅ Found plugin library at: $PLUGIN_LIB"
        
        # Create proper .deb package structure
        mkdir -p deb-package/usr/local/fledge/plugins/south/iec104
        cp "$PLUGIN_LIB" deb-package/usr/local/fledge/plugins/south/iec104/
        
        # Create DEBIAN control file with proper metadata
        mkdir -p deb-package/DEBIAN
        VERSION="1.0.0-$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
        
        # Write control file directly
        echo "Package: fledge-south-iec104" > deb-package/DEBIAN/control
        echo "Version: ${VERSION}" >> deb-package/DEBIAN/control
        echo "Section: base" >> deb-package/DEBIAN/control
        echo "Priority: optional" >> deb-package/DEBIAN/control
        echo "Architecture: amd64" >> deb-package/DEBIAN/control
        echo "Depends: libssl3, libc6" >> deb-package/DEBIAN/control
        echo "Maintainer: FledgePower Team <noreply@fledgepower.com>" >> deb-package/DEBIAN/control
        echo "Description: Fledge South IEC 60870-5-104 Plugin" >> deb-package/DEBIAN/control
        echo " This plugin provides IEC 60870-5-104 protocol support for Fledge." >> deb-package/DEBIAN/control
        echo " It allows Fledge to collect data from IEC 104 devices and systems." >> deb-package/DEBIAN/control
        
        # Build the .deb package
        cd deb-package
        dpkg-deb --build . ../fledge-south-iec104_${VERSION}_amd64.deb
        cd ..
        
        echo "✅ Manual .deb package created successfully!"
        ls -la *.deb

    # --- ФАЗА 5: ПОШУК ТА ПУБЛІКАЦІЯ АРТЕФАКТУ ---
    - name: Find and Prepare Package for Publish
      run: |
        echo "=== SEARCHING FOR .DEB PACKAGE ==="
        DEB_FILE=$(find ./fledge-south-iec104-source/build -name "fledge-south-iec104_*.deb" | head -n 1)
        
        # Надійна перевірка, що файл знайдено
        if [ -z "$DEB_FILE" ]; then
          echo "::error:: .deb file for IEC104 plugin was not found!"
          echo "=== DEBUGGING: All .deb packages found ==="
          find ./fledge-south-iec104-source/build -name "*.deb" -exec ls -la {} \;
          echo "=== DEBUGGING: build directory contents ==="
          ls -la ./fledge-south-iec104-source/build/
          exit 1
        fi
        
        echo "✅ Package created successfully at $DEB_FILE"
        
        # Створюємо директорію для артефакту та копіюємо пакет
        mkdir -p artifacts/
        cp "$DEB_FILE" artifacts/
        
        # Показуємо інформацію про пакет
        ls -la artifacts/
        dpkg -I artifacts/*.deb
        
        echo "PACKAGE_NAME=$(basename $DEB_FILE)" >> $GITHUB_ENV

    - name: Upload Build Artifact to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: fledge-south-iec104-deb
        path: artifacts/
        retention-days: 30

