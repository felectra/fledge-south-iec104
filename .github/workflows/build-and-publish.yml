# Назва автоматизованого процесу
name: Build and Publish .deb Package

on:
  push:
    branches:
      # Для тестування використовуйте свою гілку
      - feature/setup-ci-cd

jobs:
  build:
    # Використовуємо останню LTS версію Ubuntu для актуальності
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write

    steps:
    # --- ФАЗА 1: ПІДГОТОВКА СЕРЕДОВИЩА ---
    - name: Checkout Plugin Source Code
      uses: actions/checkout@v4
      with:
        # Явно вказуємо, який репозиторій клонувати
        repository: felectra/fledge-south-iec104
        # Клонуємо в окрему, тимчасову директорію
        path: fledge-south-iec104-source

    - name: Install All Build Dependencies
      run: |
        sudo apt-get update
        # Встановлюємо вичерпний список залежностей, виявлених під час попередніх запусків
        sudo apt-get install -y git build-essential cmake libssl-dev libboost-all-dev python3-dev python3-pip uuid-dev libcurl4-openssl-dev sqlite3
        # Встановлюємо залежність Python
        sudo pip3 install numpy
        # Створюємо символічне посилання для sqlite3, оскільки Fledge шукає його в нестандартному місці
        sudo ln -s /usr/bin/sqlite3 /usr/local/bin/sqlite3

    # --- ФАЗА 2: ІНТЕГРАЦІЯ КОМПОНЕНТІВ ---
    - name: Clone Fledge Source Code (Stable Version)
      run: |
        # Клонуємо стабільну, зафіксовану версію Fledge для передбачуваності збірки
        git clone --branch v3.1.0 --depth 1 https://github.com/fledge-iot/fledge.git

    - name: Integrate Plugin into Fledge Source
      run: |
        # Гарантуємо, що директорія для плагінів існує
        mkdir -p fledge/plugins/south/
        # Переміщуємо вихідний код плагіна всередину структури Fledge
        mv fledge-south-iec104-source fledge/plugins/south/fledge-south-iec104
        # "Реєструємо" наш плагін у системі збірки Fledge
        echo 'add_subdirectory(fledge-south-iec104)' >> fledge/plugins/south/CMakeLists.txt

    # --- ФАЗА 3: УНІФІКОВАНА ЗБІРКА ТА ПАКУВАННЯ ---
    - name: Prepare Build Directory
      run: mkdir -p fledge/cmake_build

    - name: Configure, Build, and Create Packages
      # Виконуємо всі команди збірки з однієї робочої директорії для надійності
      working-directory: ./fledge/cmake_build
      run: |
        # Конфігуруємо весь проєкт (Fledge + плагін)
        cmake ..
        # Збираємо все разом. Це може зайняти деякий час.
        make
        # Створюємо .deb пакети для всіх компонентів
        cpack

    # --- ФАЗА 4: ПОШУК ТА ПУБЛІКАЦІЯ АРТЕФАКТУ ---
    - name: Find and Prepare Package for Publish
      run: |
        # Шукаємо .deb пакет саме нашого плагіна в директорії збірки
        DEB_FILE=$(find ./fledge/cmake_build -name "fledge-south-iec104*.deb" | head -n 1)
        # Надійна перевірка, що файл знайдено
        if [ -z "$DEB_FILE" ]; then
          echo "::error:: .deb file for the plugin was not found!"
          echo "Listing all found .deb packages for debugging:"
          find ./fledge/cmake_build -name "*.deb"
          exit 1
        fi
        echo "Package created successfully at $DEB_FILE"
        echo "Publishing logic can be implemented here."

