# Назва автоматизованого процесу
name: Build and Publish .deb Package

# Умова запуску: при будь-якому пуші в гілку 'main'.
# Пам'ятайте: для тестування спочатку змініть це на вашу робочу гілку (напр., 'feature/setup-ci-cd'),
# а потім, після успішної перевірки, поверніть на 'main' перед злиттям
on:
  push:
    branches:
      - feature/setup-ci-cd

jobs:
  build:
    # Використовуємо віртуальну машину з Ubuntu останньої версії
    runs-on: ubuntu-latest

    # Надаємо дозволи для нашого процесу
    permissions:
      contents: read      # Дозвіл на читання коду з репозиторію
      packages: write    # Ключовий дозвіл: на запис у GitHub Packages

    steps:
    # Крок 1: Клонування репозиторію
    - name: Checkout repository
      uses: actions/checkout@v4

    # Крок 2: Встановлення залежностей для збірки
    # ВАЖЛИВО: Цей блок потрібно адаптувати для кожного плагіна.
    # Перевірте документацію або CMakeLists.txt плагіна, щоб визначити необхідні пакети.
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libssl-dev

    # Крок 3: Компіляція плагіна
    - name: Build the plugin
      run: |
        mkdir build
        cd build
        cmake ..
        make

    # Крок 4: Створення .deb пакета
    - name: Create .deb package
      run: |
        cd build
        # Команда 'cpack' використовує інструкції з CMakeLists.txt для створення пакета
        cpack

    # Крок 5: Публікація пакета в GitHub Packages
    - name: Publish to GitHub Packages
      run: |
        # Знаходимо наш .deb файл. Припускаємо, що він один.
        DEB_FILE=$(find . -name "*.deb" | head -n 1)
        if [ -z "$DEB_FILE" ]; then
          echo "::error::.deb file not found!"
          exit 1
        fi
        echo "Publishing $DEB_FILE..."
        
        # Використовуємо curl для завантаження файлу в APT репозиторій організації
        # URL має бути у форматі: https://apt.pkg.github.com/{OWNER}/{REPO_NAME}
        # Але для APT репозиторіїв GitHub очікує просто ім'я файлу в кінці.
        curl --fail -X PUT \
          -u "${{ secrets.GITHUB_ACTOR }}:${{ secrets.GITHUB_TOKEN }}" \
          -H "Content-Type: application/octet-stream" \
          -T "$DEB_FILE" \
          "https://apt.pkg.github.com/felectra/$(basename $DEB_FILE)"

