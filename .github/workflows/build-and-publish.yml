# Назва автоматизованого процесу
name: Build and Publish .deb Package

on:
  push:
    branches:
      # Для тестування використовуйте свою гілку, напр. 'feature/setup-ci-cd'
      # Для робочого процесу тут має бути 'main'
      - feature/setup-ci-cd

jobs:
  build:
    # 1. Використовуємо Ubuntu 24.04, як зазначено в PRD
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        # Крок 2.1: Встановлюємо базові утиліти
        sudo apt-get update
        sudo apt-get install -y ca-certificates curl gnupg

        # Крок 2.2: Завантажуємо та встановлюємо офіційний GPG ключ Fledge
        curl -sL https://archives.fledge-iot.org/KEY.gpg | sudo gpg --dearmor -o /usr/share/keyrings/fledge-archive-keyring.gpg

        # Крок 2.3: Додаємо СТАБІЛЬНИЙ репозиторій Fledge v3.1.0 для Ubuntu 24.04
        echo "deb [signed-by=/usr/share/keyrings/fledge-archive-keyring.gpg] http://archives.fledge-iot.org/3.1.0/ubuntu2404/ main" | sudo tee /etc/apt/sources.list.d/fledge.list > /dev/null

        # Крок 2.4: Оновлюємо список пакетів та встановлюємо Fledge SDK та інші залежності
        sudo apt-get update
        sudo apt-get install -y fledge-dev build-essential cmake libssl-dev

    - name: Build the plugin
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Release ..
        make

    - name: Create .deb package
      run: |
        cd build
        cpack

    - name: Publish to GitHub Packages
      run: |
        DEB_FILE=$(find . -name "*.deb" | head -n 1)
        if [ -z "$DEB_FILE" ]; then
          echo "::error::.deb file not found!"
          exit 1
        fi
        echo "Publishing $DEB_FILE..."
        curl --fail -X PUT \
          -u "${{ secrets.GITHUB_ACTOR }}:${{ secrets.GITHUB_TOKEN }}" \
          -H "Content-Type: application/octet-stream" \
          -T "$DEB_FILE" \
          "https://apt.pkg.github.com/felectra/$(basename $DEB_FILE)"

