# Назва автоматизованого процесу
name: Build and Publish .deb Package

on:
  push:
    branches:
      # Для тестування використовуйте свою гілку, напр. 'feature/setup-ci-cd'
      - feature/setup-ci-cd

jobs:
  build:
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout plugin repository
      uses: actions/checkout@v4
      with:
        path: fledge-south-iec104

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git build-essential cmake libssl-dev libboost-all-dev python3-dev python3-pip uuid-dev libcurl4-openssl-dev sqlite3
        sudo pip3 install numpy
        sudo ln -s /usr/bin/sqlite3 /usr/local/bin/sqlite3

    - name: Clone and Build Fledge from source (Stable Version)
      run: |
        # === СТРАТЕГІЧНЕ ПОКРАЩЕННЯ: Фіксуємо стабільну версію Fledge ===
        git clone --branch v3.1.0 --depth 1 https://github.com/fledge-iot/fledge.git
        cd fledge
        mkdir cmake_build
        cd cmake_build
        cmake ..
        make
        sudo make install

    - name: Link Fledge headers to standard location
      run: |
        # 'make install' кладе заголовки в /usr/local/include/fledge,
        # а плагін шукає їх в /usr/include/fledge. Створюємо посилання.
        sudo ln -s /usr/local/include/fledge /usr/include/fledge

    - name: Build the plugin
      run: |
        cd fledge-south-iec104
        mkdir build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Release ..
        make

    - name: Create .deb package
      run: |
        cd fledge-south-iec104/build
        cpack

    - name: Publish to GitHub Packages
      run: |
        DEB_FILE=$(find ./fledge-south-iec104/build -name "*.deb" | head -n 1)
        if [ -z "$DEB_FILE" ]; then
          echo "::error::.deb file not found!"
          exit 1
        fi
        echo "Publishing $DEB_FILE..."
        echo "Package created successfully at $DEB_FILE"